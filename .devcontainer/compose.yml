name: devcontainer
services:
  dev:
    build:
      context: ..
      dockerfile: ./.devcontainer/docker/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    volumes:
      - ..:/workspace
      - node_modules:/workspace/node_modules # volume trick
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: api.www.yantene.net
      POSTGRES_USER: api.www.yantene.net
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]

volumes:
  node_modules:
  postgres_data:
