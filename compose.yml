services:
  site:
    build:
      context: .
      dockerfile: ./frontend/docker/Dockerfile
    ports:
      - target: 3000
        published: 4000
        protocol: tcp
        mode: host
  api:
    build:
      context: .
      dockerfile: ./backend/docker/Dockerfile
    ports:
      - target: 3100
        published: 4100
        protocol: tcp
        mode: host
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: backend
      POSTGRES_USER: backend
      POSTGRES_PASSWORD: password
    volumes:
      - ./volumes/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
