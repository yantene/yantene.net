runs:
  using: Composite

  steps:
    - name: read .tool-versions
      uses: marocchino/tool-versions-action@v1
      id: tool_versions

    - name: setup node
      uses: actions/setup-node@v3
      with:
        node-version: ${{ steps.tool_versions.outputs.nodejs }}
        cache: npm

    - name: install npm packages
      run: npm ci
      shell: bash
