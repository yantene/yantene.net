name: www.yantene.net docker build

on:
  push:
    branches:
      - issue-103

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup buildx
        uses: docker/setup-buildx-action@v3

      - name: login to github container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: get version from package.json
        id: package
        uses: codex-team/action-nodejs-package-info@v1.1
        with:
          path: sites/www.yantene.net

      - name: staging cache
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache-staging
          key: ${{ runner.os }}-buildx-${{ github.sha }}-staging
          restore-keys: |
            ${{ runner.os }}-buildx-staging-

      - name: build and push latest staging image
        uses: docker/build-push-action@v5
        with:
          context: ./sites/www.yantene.net
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/www.yantene.net:staging-latest
            ghcr.io/${{ github.repository_owner }}/www.yantene.net:staging
          cache-from: type=local,src=/tmp/.buildx-cache-staging
          cache-to: type=local,dest=/tmp/.buildx-cache-staging,mode=max
          target: runner
          build-args: |
            APP_ENV=staging

      - name: check if versioned staging image exists
        id: check-staging-image
        run: |
          if docker manifest inspect "ghcr.io/${{ github.repository_owner }}/www.yantene.net:staging-${{ steps.package.outputs.version }}" > /dev/null 2>&1; then
            echo "VERSIONED_STAGING_IMAGE=1" >> "$GITHUB_ENV"
          else
            echo "VERSIONED_STAGING_IMAGE=0" >> "$GITHUB_ENV"
          fi

      - name: build and push versioned staging image
        if: steps.check-staging-image.outputs.VERSIONED_STAGING_IMAGE == '0'
        uses: docker/build-push-action@v5
        with:
          context: ./sites/www.yantene.net
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/www.yantene.net:staging-${{ steps.package.outputs.version }}
          cache-from: type=local,src=/tmp/.buildx-cache-staging
          cache-to: type=local,dest=/tmp/.buildx-cache-staging,mode=max
          target: runner
          build-args: |
            APP_ENV=staging
