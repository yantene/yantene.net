name: www.yantene.net docker build

on:
  push:
    branches:
      - main
    paths:
      - sites/www.yantene.net/**
  release:
    types:
      - created

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: setup buildx
        uses: docker/setup-buildx-action@v1

      - name: cache
        uses: actions/cache@v2
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: login to github container registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push staging image
        uses: docker/build-push-action@v2
        if: github.event_name == 'push'
        with:
          context: ./sites/www.yantene.net
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/www.yantene.net:staging-${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
          target: runner
          build-args: |
            APP_ENV=staging

      - name: build and push production image
        uses: docker/build-push-action@v5
        if: github.event_name == 'release'
        with:
          context: ./sites/www.yantene.net
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/www.yantene.net:production-${{ github.event.release.tag_name }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
          target: runner
          build-args: |
            APP_ENV=production
