name: www.yantene.net docker build

on:
  push:
    branches:
      - issue-103

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup buildx
        uses: docker/setup-buildx-action@v3

      - name: login to github container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: get version from package.json
        id: package
        run: |
          echo "version=$(jq -r .version sites/www.yantene.net/package.json)" >> $GITHUB_ENV

      - name: staging cache
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache-staging
          key: ${{ runner.os }}-buildx-staging-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-staging-

      - name: build and push staging image
        uses: docker/build-push-action@v5
        with:
          context: ./sites/www.yantene.net
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/www.yantene.net:staging-${{ steps.package.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/www.yantene.net:staging
          cache-from: type=local,src=/tmp/.buildx-cache-staging
          cache-to: type=local,dest=/tmp/.buildx-cache-staging,mode=max
          target: runner
          build-args: |
            APP_ENV=staging
