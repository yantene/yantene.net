name: frontend

on:
  pull_request:
    paths:
      - frontend/**

jobs:
  eslint:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: setup
        uses: ./.github/workflows/setup

      - name: run eslint
        uses: reviewdog/action-eslint@v1
        with:
          workdir: frontend
          reporter: github-pr-review
          fail_on_error: true
