name: backend

on:
  pull_request:
    paths:
      - backend/**

jobs:
  jest:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: setup
        uses: ./.github/workflows/setup

      - name: run jest
        uses: ArtiomTr/jest-coverage-report-action@v2
        with:
          working-directory: backend
